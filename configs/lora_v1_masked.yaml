# Identical to lora_v1.yaml EXCEPT mask_prompt:true — the only variable in the
# masked-vs-unmasked ablation (task: prompt-masked training). Use with data built by
# `build_dataset.py --format chat` ({"messages":[system,user,assistant]}). Loss falls on
# the assistant JSON only (~64 tok) instead of the whole 640-tok sequence.
# Per the project rule we iterate on DATA/pipeline, not hyperparameters — every other
# field here matches lora_v1.yaml so the comparison is clean.
fine_tune_type: lora
mask_prompt: true
num_layers: 16
batch_size: 4
iters: 300
val_batches: 10
learning_rate: 1e-4
steps_per_report: 20
steps_per_eval: 100
save_every: 150
max_seq_length: 2048
grad_checkpoint: true
lora_parameters:
  rank: 16
  scale: 20.0
  dropout: 0.05
