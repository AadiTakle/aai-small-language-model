# QLoRA config for the 50-junk SMOKE test (plumbing only; quality irrelevant).
# model / data / adapter_path are passed on the CLI by scripts/run_smoke.py.
fine_tune_type: lora
num_layers: 8
batch_size: 2
iters: 80
val_batches: 5
learning_rate: 1e-4
steps_per_report: 10
steps_per_eval: 40
save_every: 80
max_seq_length: 1024
grad_checkpoint: false
lora_parameters:
  rank: 8
  scale: 20.0
  dropout: 0.0
